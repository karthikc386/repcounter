<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Workout Counter</title>

<style>
:root{
  --bg:#0f172a; --card:#111c33; --text:#f8fafc; --muted:rgba(248,250,252,.75);
  --accent:#38bdf8; --good:#22c55e; --warn:#facc15; --bad:#ef4444;
  --btnText:#071018; --shadow: 0 12px 28px rgba(0,0,0,.25);
  --appGradientStart:#0b1630; --appGradientEnd:#0a1426;
}
body.light{
  --bg:#f6f7fb; --card:#ffffff; --text:#0b1220; --muted:rgba(11,18,32,.65);
  --accent:#0284c7; --good:#16a34a; --warn:#ca8a04; --bad:#dc2626;
  --btnText:#ffffff; --shadow: 0 10px 22px rgba(2,8,23,.10);
  --appGradientStart:#e8eaf0; --appGradientEnd:#f6f7fb;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:18px;
}

button{
  border:none;
  cursor:pointer;
  touch-action: manipulation; /* ✅ prevent double-tap zoom safely */
  font-weight:600;
}

button:focus-visible{
  outline:3px solid var(--accent);
  outline-offset:2px;
}

.app{
  width:100%;
  max-width:420px;
  background: linear-gradient(180deg, var(--appGradientStart), var(--appGradientEnd));
  border-radius:22px;
  padding:22px 18px 18px;
  box-shadow:0 30px 60px rgba(0,0,0,.45);
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
}

h1{
  font-size:20px;
  font-weight:700;
}

.toggle{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  color:var(--muted);
}

.switch{
  width:44px;height:26px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.10);
  position:relative;
  padding:0;
}

.knob{
  width:20px;height:20px;
  border-radius:50%;
  background:var(--text);
  position:absolute;
  top:50%;
  left:3px;
  transform:translateY(-50%);
  transition:left .2s;
}

.switch[data-on="true"] .knob{ left:21px; }
.switch[data-on="true"]{ background:rgba(56,189,248,.25); }

.exercise{
  font-size:26px;
  font-weight:800;
  margin:10px 0 14px;
  color:var(--accent);
}

.subline{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:10px;
  font-size:13px;
  color:var(--muted);
}

.pill{
  padding:6px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.06);
}

.counterWrap{
  margin:18px 0 10px;
  position:relative;
}

.counter{
  font-size:clamp(64px, 22vw, 104px); /* ✅ responsive */
  font-weight:900;
  text-align:center;
}

.status{
  text-align:center;
  font-size:18px;
  min-height:24px;
  margin:6px 0 12px;
  font-weight:600;
  color:var(--good);
}
.status.warn{ color:var(--warn); }
.status.bad{ color:var(--bad); }

.progress{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  color:var(--muted);
  margin-bottom:12px;
}

.controls{
  display:flex;
  gap:10px;
}
.controls button{
  flex:1;
  padding:12px;
  font-size:15px;
  border-radius:14px;
}

.start{ background:var(--good); color:var(--btnText); }
.pause{ background:var(--warn); color:var(--btnText); }
.reset{ background:var(--bad); color:#ffffff; }

.miniRow{
  margin-top:12px;
  display:flex;
  gap:10px;
}
.miniBtn{
  flex:1;
  padding:10px;
  font-size:14px;
  background:rgba(255,255,255,.06);
  border-radius:12px;
  color:var(--text);
}

.footerNote{
  margin-top:14px;
  font-size:11px;
  opacity:.55;
}
</style>
</head>

<body>
<div class="app">
  <div class="topbar">
    <h1>Workout Counter</h1>
    <div class="toggle">
      <span>Theme</span>
      <button class="switch" id="themeSwitch" data-on="false" aria-label="Toggle light/dark theme" role="switch" aria-checked="false">
        <div class="knob"></div>
      </button>
    </div>
  </div>

  <div class="exercise" id="exerciseName">—</div>

  <div class="subline">
    <div class="pill" id="roundInfo">Round —</div>
    <div class="pill" id="exerciseInfo">Reps — • Pace —</div>
  </div>

  <div class="counterWrap">
    <div class="counter" id="repCounter" role="timer" aria-live="polite">0</div>
  </div>

  <div class="status" id="statusText" role="status" aria-live="polite"></div>

  <div class="progress">
    <div id="exerciseProgress">Exercise —</div>
    <div id="nextUp">Next —</div>
  </div>

  <div class="controls">
    <button class="start" id="startBtn" aria-label="Start workout">Start</button>
    <button class="pause" id="pauseBtn" aria-label="Pause workout">Pause</button>
    <button class="reset" id="resetBtn" aria-label="Reset workout">Reset</button>
  </div>

  <div class="miniRow">
    <button class="miniBtn" id="skipBtn" aria-label="Skip to next exercise">Skip</button>
    <button class="miniBtn" id="restartExerciseBtn" aria-label="Restart current exercise">Restart</button>
  </div>

  <div class="footerNote">
    Audio & vibration require a tap on mobile.
  </div>
</div>

<script>
const workout = {
  workout:[
    { exercise:"Breath of Joy", rounds:3, repsPerRound:15, secondsPerCount:3, restSecondsBetweenRounds:20 },
    { exercise:"Bhastrika Pranayama", rounds:3, repsPerRound:20, secondsPerCount:2, restSecondsBetweenRounds:20 },
    { exercise:"Nadi Shodhana", rounds:3, repsPerRound:15, secondsPerCount:4, restSecondsBetweenRounds:20 },
    { exercise:"Box Breath", rounds:2, repsPerRound:20, secondsPerCount:5, restSecondsBetweenRounds:45 }
  ]
};

const settings = { countdownSeconds:3, beepEnabled:true, hapticEnabled:true };

let exerciseIndex=0, currentRound=1, currentRep=0;
let isPaused=false, isCounting=false, isResting=false;
let repInterval=null, restInterval=null, countdownInterval=null;
let audioCtx=null;

const el = id => document.getElementById(id);

const els = {
  exerciseName:el("exerciseName"),
  repCounter:el("repCounter"),
  roundInfo:el("roundInfo"),
  exerciseInfo:el("exerciseInfo"),
  status:el("statusText"),
  progress:el("exerciseProgress"),
  nextUp:el("nextUp")
};

function getEx(){ return workout.workout[exerciseIndex]; }

function updateUI(){
  const ex=getEx();
  els.exerciseName.textContent=ex?.exercise ?? "—";
  els.repCounter.textContent=currentRep;
  els.roundInfo.textContent=ex?`Round ${currentRound} of ${ex.rounds}`:"—";
  els.exerciseInfo.textContent=ex?`Reps ${ex.repsPerRound} • Pace ${ex.secondsPerCount}s`:"—";
  els.progress.textContent=`Exercise ${exerciseIndex+1} / ${workout.workout.length}`;

  const isLastExercise = exerciseIndex + 1 >= workout.workout.length;
  els.nextUp.textContent = isLastExercise ? "Final exercise!" : "Next: " + workout.workout[exerciseIndex+1].exercise;
}

function setStatus(t,c=""){ els.status.className="status "+c; els.status.textContent=t; }

function ensureAudio(){
  if(audioCtx) return audioCtx;

  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  audioCtx = new AudioCtx();

  // iOS requires an actual sound to start the context
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  g.gain.value = 0;          // silent
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + 0.01);

  return audioCtx;
}


function unlockAudio(){
  const c=ensureAudio();
  if(c.state==="suspended") c.resume();
}

function beep(){
  if(!settings.beepEnabled) return;
  const c=ensureAudio();
  if(c.state!=="running") return;
  const o=c.createOscillator(), g=c.createGain();
  o.frequency.value=880; g.gain.value=0.3;
  o.connect(g); g.connect(c.destination);
  o.start(); setTimeout(()=>o.stop(),50);
}

function tripleBeep(){
  if(!settings.beepEnabled) return;
  let count = 0;
  const interval = setInterval(() => {
    beep();
    vibrate();
    count++;
    if(count === 3) clearInterval(interval);
  }, 200);
}

function vibrate(){ if(settings.hapticEnabled && navigator.vibrate) navigator.vibrate(15); }

function cue(){ beep(); vibrate(); }

function clearTimers(){
  clearInterval(repInterval); clearInterval(restInterval); clearInterval(countdownInterval);
}

function start(){
  unlockAudio();
  if(isCounting||isResting||countdownInterval) return; // guard against multiple starts
  let t=settings.countdownSeconds;
  setStatus(`Starting in ${t}`,"warn");
  countdownInterval=setInterval(()=>{
    if(isPaused) return;
    if(--t>0) setStatus(`Starting in ${t}`,"warn");
    else{
      clearTimers();
      setStatus("Go!");
      runReps();
    }
  },1000);
}

function runReps(){
  const ex=getEx();
  isCounting=true;

  repInterval=setInterval(()=>{
    if(isPaused) return;

    currentRep++;
    els.repCounter.textContent=currentRep;
    cue();

    if(currentRep >= ex.repsPerRound){
      clearTimers();
      isCounting=false;

      tripleBeep(); // 👈 END OF ROUND SOUND
      nextRound();
    }
  }, ex.secondsPerCount * 1000);
}

function nextRound(){
  const ex=getEx();
  if(currentRound>=ex.rounds){ nextExercise(); return; }
  isResting=true; let r=ex.restSecondsBetweenRounds;
  setStatus(`Rest ${r}`,"warn");
  restInterval=setInterval(()=>{
    if(isPaused) return;
    if(--r>0) setStatus(`Rest ${r}`,"warn");
    else{ clearTimers(); isResting=false; currentRound++; currentRep=0; updateUI(); start(); }
  },1000);
}

function nextExercise(){
  const restAfterExercise = 20;

  // Workout finished
  if(exerciseIndex + 1 >= workout.workout.length){
    setStatus("Workout Complete!");
    tripleBeep();
    return;
  }

  // Rest before next exercise
  isResting = true;
  let r = restAfterExercise;
  setStatus(`Rest ${r} before next exercise`, "warn");

  restInterval = setInterval(() => {
    if(isPaused) return;
    if(--r > 0){
      setStatus(`Rest ${r} before next exercise`, "warn");
    } else {
      clearTimers();
      isResting = false;

      exerciseIndex++;
      currentRound = 1;
      currentRep = 0;

      updateUI();
      start();
    }
  }, 1000);
}


function togglePause(){ isPaused=!isPaused; setStatus(isPaused?"Paused":"Go!",isPaused?"bad":""); }

function reset(){
  clearTimers(); exerciseIndex=0; currentRound=1; currentRep=0;
  isPaused=isCounting=isResting=false;
  updateUI(); setStatus("Ready");
}

document.getElementById("startBtn").onclick = start;
document.getElementById("pauseBtn").onclick=togglePause;
document.getElementById("resetBtn").onclick=reset;
document.getElementById("skipBtn").onclick=nextExercise;
document.getElementById("restartExerciseBtn").onclick=()=>{
  clearTimers();
  isPaused=false;
  isCounting=false;
  isResting=false;
  currentRound=1;
  currentRep=0;
  updateUI();
  start();
};

document.getElementById("themeSwitch").onclick=()=>{
  const isLight = document.body.classList.toggle("light");
  const sw = document.getElementById("themeSwitch");
  sw.setAttribute("data-on", isLight);
  sw.setAttribute("aria-checked", isLight);
};

updateUI(); setStatus("Ready");
</script>
</body>
</html>
